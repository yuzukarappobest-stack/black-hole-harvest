<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#060711">
    <title>ブラックホール・ハーベスト</title>
    <link rel="stylesheet" href="styles.css?v=2">
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="ゲーム情報">
        <div>
          <p class="label">SCORE</p>
          <p id="score" class="value">0</p>
        </div>
        <div>
          <p class="label">TIME</p>
          <p id="time" class="value">60.0</p>
        </div>
        <div>
          <p class="label">BEST</p>
          <p id="best" class="value">0</p>
        </div>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="ブラックホールで天体を飲み込むゲーム"></canvas>

        <div id="startPanel" class="panel">
          <h1>ブラックホール・ハーベスト</h1>
          <p>1分間でブラックホールを動かし、天体を飲み込んでポイントを稼ぐ。</p>
          <button id="startButton" class="primary-button" type="button">START</button>
        </div>

        <div id="finishPanel" class="panel hidden">
          <p class="label">RESULT</p>
          <h2 id="finalScore">0</h2>
          <p id="resultMessage">もう一度、重力を研ぎ澄ませ。</p>
          <button id="restartButton" class="primary-button" type="button">もういちどあそぶ？</button>
        </div>
      </section>

      <section class="legend" aria-label="得点表">
        <div><span class="dot asteroid"></span>小惑星 <b>1</b></div>
        <div><span class="dot small"></span>小さい惑星 <b>2</b></div>
        <div><span class="dot large"></span>大きい惑星 <b>3</b></div>
        <div><span class="dot star"></span>恒星 <b>4</b></div>
        <div><span class="dot nebula"></span>星雲 <b>5</b></div>
        <div><span class="dot blackhole"></span>ブラックホール <b>10</b></div>
      </section>
    </main>

    <script src="game.js?v=4"></script>
  </body>
</html>
