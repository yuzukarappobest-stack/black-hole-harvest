<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#7bd8ff">
    <title>ちょうちょ・フライト</title>
    <link rel="stylesheet" href="butterfly.css?v=2">
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="ゲーム情報">
        <div>
          <span>のこり</span>
          <strong id="time">30.0</strong>
        </div>
        <div class="goal">
          <span>もくひょう</span>
          <strong>30秒 とぼう！</strong>
        </div>
        <div>
          <span>スコア</span>
          <strong id="score">0</strong>
        </div>
        <button id="pauseButton" class="pause-button" type="button" aria-label="一時停止">Ⅱ</button>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="蝶が外敵を避けながら空を飛ぶゲーム"></canvas>

        <div id="startPanel" class="panel">
          <h1>ちょうちょ・フライト</h1>
          <p>長押しで上へ。離すと下へ。外敵をよけて30秒飛ぼう。</p>
          <button id="startButton" type="button">START</button>
        </div>

        <div id="finishPanel" class="panel hidden">
          <p id="resultLabel" class="label">RESULT</p>
          <h2 id="resultTitle">0</h2>
          <p id="resultMessage">もういちど空へ。</p>
          <button id="restartButton" type="button">もういちど</button>
        </div>
      </section>

      <section class="control-row">
        <button id="flapButton" class="flap-button" type="button">
          <span>↑</span>
          長押しで<br>上昇！
        </button>
      </section>
    </main>

    <script src="butterfly.js?v=2"></script>
  </body>
</html>
