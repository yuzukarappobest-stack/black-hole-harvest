<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff6d8">
    <title>ひらがな よみあげ</title>
    <link rel="stylesheet" href="hiragana.css?v=1">
  </head>
  <body>
    <main class="learn-app">
      <section class="topbar" aria-label="がくしゅうじょうほう">
        <div>
          <span>せいかい</span>
          <strong id="correctCount">0</strong><span>/10</span>
        </div>
        <a href="index.html" aria-label="ミニゲームへ">ミニゲーム</a>
      </section>

      <section class="letter-stage" aria-live="polite">
        <p class="prompt">よんでみよう</p>
        <div id="letterCard" class="letter-card">あ</div>
        <p id="feedback" class="feedback"> </p>
      </section>

      <section class="controls" aria-label="こたえ">
        <button id="answerButton" class="answer-button" type="button">こたえる</button>
        <button id="nextButton" class="ghost-button" type="button">つぎ</button>
      </section>

      <section id="completePanel" class="complete-panel hidden" aria-live="assertive">
        <div class="complete-box">
          <h1>おめでとう！</h1>
          <p>ミニゲームであそぶ？</p>
          <div class="choice-row">
            <button id="playGameButton" class="answer-button small" type="button">はい</button>
            <button id="stayButton" class="ghost-button small" type="button">もういちど</button>
          </div>
        </div>
      </section>
    </main>

    <script src="hiragana.js?v=1"></script>
  </body>
</html>
