<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#101829">
    <title>テトリス</title>
    <link rel="stylesheet" href="tetris.css?v=3">
  </head>
  <body>
    <main class="tetris-app">
      <section class="hud" aria-label="ゲーム情報">
        <div>
          <span>SCORE</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>LINES</span>
          <strong id="lines">0</strong>
        </div>
        <div>
          <span>BEST</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <section class="game-layout">
        <canvas id="board" aria-label="ブロックを積んで列を消すゲーム"></canvas>

        <aside class="side-panel">
          <p>NEXT</p>
          <canvas id="next" aria-label="次のブロック"></canvas>
          <button id="startButton" class="primary" type="button">START</button>
          <button id="learnButton" class="ghost" type="button">もういちどあそぶ？</button>
        </aside>
      </section>

      <section class="controls" aria-label="操作ボタン">
        <button id="leftButton" type="button">←</button>
        <button id="rotateButton" type="button">↻</button>
        <button id="rightButton" type="button">→</button>
        <button id="downButton" type="button">↓</button>
        <button id="dropButton" type="button">おとす</button>
      </section>

      <section id="messagePanel" class="message-panel">
        <div class="message-box">
          <h1>テトリス</h1>
          <p id="messageText">ブロックをならべて、よこ一列を消そう。</p>
          <div class="message-actions">
            <button id="overlayStartButton" class="primary" type="button">START</button>
            <button id="overlayLearnButton" class="ghost hidden" type="button">がくしゅうへ</button>
          </div>
        </div>
      </section>
    </main>

    <script src="tetris.js?v=3"></script>
  </body>
</html>
