<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#8d6238">
    <title>ほうせきはっくつ</title>
    <link rel="stylesheet" href="gem.css?v=2">
  </head>
  <body>
    <main class="dig-app">
      <section class="hud" aria-label="ゲーム情報">
        <div><span>のこり</span><strong id="time">30.0</strong></div>
        <div><span>スコア</span><strong id="score">0</strong></div>
        <div><span>ほうせき</span><strong id="found">0/10</strong></div>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="地面を掘って宝石を探すゲーム"></canvas>
        <div id="startPanel" class="panel">
          <h1>ほうせき<br>はっくつ</h1>
          <p>いどうして、ほるをれんだ。30秒で200てんをめざそう。</p>
          <button id="startButton" type="button">START</button>
        </div>
        <div id="finishPanel" class="panel hidden">
          <p id="resultLabel" class="label">RESULT</p>
          <h2 id="resultTitle">0</h2>
          <p id="resultMessage">もういちどほろう。</p>
          <button id="restartButton" type="button">がくしゅうへ</button>
        </div>
      </section>

      <section class="controls" aria-label="操作">
        <span></span>
        <button id="upButton" class="move-up" type="button">↑</button>
        <span></span>
        <button id="leftButton" class="move-left" type="button">←</button>
        <button id="digButton" class="dig-button" type="button">ほる</button>
        <button id="rightButton" class="move-right" type="button">→</button>
        <span></span>
        <button id="downButton" class="move-down" type="button">↓</button>
        <span></span>
      </section>
    </main>

    <script src="gem.js?v=2"></script>
  </body>
</html>
