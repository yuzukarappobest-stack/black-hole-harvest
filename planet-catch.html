<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10254a">
    <title>惑星キャッチ</title>
    <link rel="stylesheet" href="planet-catch.css?v=1">
  </head>
  <body>
    <main class="planet-app">
      <section class="hud" aria-label="ゲーム情報">
        <div><span>のこり</span><strong id="time">30.0</strong></div>
        <div><span>スコア</span><strong id="score">0</strong></div>
        <div><span>カゴ</span><strong id="basketLoad">0/24</strong></div>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="落ちてくる惑星をカゴでキャッチするゲーム"></canvas>
        <div id="startPanel" class="panel">
          <h1>惑星<br>キャッチ</h1>
          <p>カゴを左右にうごかして、30秒で200てんをめざそう。</p>
          <button id="startButton" type="button">START</button>
        </div>
        <div id="finishPanel" class="panel hidden">
          <p id="resultLabel" class="label">RESULT</p>
          <h2 id="resultTitle">0</h2>
          <p id="resultMessage">惑星をたくさんあつめよう。</p>
          <button id="learnButton" type="button">がくしゅうへ</button>
        </div>
      </section>
    </main>

    <script src="planet-catch.js?v=2"></script>
  </body>
</html>
