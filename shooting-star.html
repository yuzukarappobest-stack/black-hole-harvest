<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#081834">
    <title>ながれぼしタップ</title>
    <link rel="stylesheet" href="shooting-star.css?v=3">
  </head>
  <body>
    <main class="app">
      <header class="hud" aria-label="ゲーム情報">
        <div class="status-card">
          <span>のこり</span>
          <strong id="time">30.0</strong><b>びょう</b>
        </div>
        <div class="title-card">
          <span>ながれぼしがでたら</span>
          <strong>すぐタップ！</strong>
        </div>
        <div class="status-card">
          <span>タップしたかず</span>
          <strong id="score">0</strong><b>こ</b>
        </div>
      </header>

      <section class="game-shell">
        <canvas id="game" aria-label="流れ星をタップするゲーム"></canvas>

        <section id="startPanel" class="panel">
          <div class="panel-star">★</div>
          <h1>ながれぼし<br>タップ</h1>
          <p>ながれぼしを みつけたら<br>すぐに タップしてね！</p>
          <div class="difficulty" role="group" aria-label="むずかしさ">
            <span>はやさを えらんでね</span>
            <div class="difficulty-buttons">
              <button class="difficulty-button" type="button" data-difficulty="normal">ふつう</button>
              <button class="difficulty-button selected" type="button" data-difficulty="fast">はやい</button>
              <button class="difficulty-button" type="button" data-difficulty="super">ちょうはやい</button>
            </div>
          </div>
          <button id="startButton" type="button">はじめる</button>
        </section>

        <section id="finishPanel" class="panel hidden">
          <p class="result-label">RESULT</p>
          <h2><span id="resultScore">0</span>こ タップ！</h2>
          <p id="resultMessage">たくさん みつけたね！</p>
          <button id="restartButton" type="button">もういちど</button>
        </section>
      </section>

      <footer class="tip">ミスしても へいきだよ</footer>
    </main>
    <script src="shooting-star.js?v=3"></script>
  </body>
</html>
