<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff6d8">
    <title>ひらがな ぶんしょう</title>
    <link rel="stylesheet" href="choice-lesson.css?v=2">
  </head>
  <body>
    <main class="lesson-app">
      <section class="topbar" aria-label="がくしゅうじょうほう">
        <a href="learn.html" aria-label="学習メニューへ">←</a>
        <div><span>せいかい</span><strong id="correctCount">0</strong><span id="goalCount">/8</span></div>
      </section>

      <section class="stage" aria-live="polite">
        <p id="prompt" class="prompt">よくきいて えらぼう</p>
        <div class="visual-card">
          <span id="pictureEmoji" class="picture-emoji" aria-hidden="true">🚲</span>
        </div>
        <p id="feedback" class="feedback"> </p>
      </section>

      <section class="controls" aria-label="こたえ">
        <button id="replayButton" class="ghost-button" type="button">もういちど聞く</button>
        <div id="choiceGrid" class="choice-grid"></div>
      </section>

      <section id="completePanel" class="complete-panel hidden" aria-live="assertive">
        <div class="complete-box">
          <h1>おめでとう！</h1>
          <p>どれであそぶ？</p>
          <div id="rewardGrid" class="reward-grid"></div>
          <button id="againButton" class="ghost-button" type="button">もういちど</button>
        </div>
      </section>
    </main>

    <script src="hiragana-sentence.js?v=1"></script>
  </body>
</html>
