<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff6d8">
    <title>ひらがな だくおん・ようおん</title>
    <link rel="stylesheet" href="hiragana-dakuon.css?v=1">
  </head>
  <body>
    <main class="learn-app">
      <section class="topbar" aria-label="がくしゅうじょうほう">
        <div>
          <span>せいかい</span>
          <strong id="correctCount">0</strong><span id="goalCount">/8</span>
        </div>
        <div>
          <span>むずかしさ</span>
          <strong id="levelText">1</strong>
        </div>
      </section>

      <section class="mode-tabs" aria-label="モード">
        <button id="listenModeButton" class="mode-button active" type="button">きいてえらぶ</button>
        <button id="speechModeButton" class="mode-button" type="button">こえでこたえる</button>
      </section>

      <section class="letter-stage" aria-live="polite">
        <p id="prompt" class="prompt">だくおん・ようおんをきこう</p>
        <div class="question-row">
          <div id="letterCard" class="letter-card">?</div>
          <div id="pictureHint" class="picture-hint" aria-label="ことばのえ">
            <span id="pictureEmoji" aria-hidden="true">☀️</span>
            <img id="pictureImage" class="picture-image hidden" alt="" aria-hidden="true">
          </div>
        </div>
        <p id="feedback" class="feedback"> </p>
      </section>

      <section id="listenControls" class="listen-controls" aria-label="きいてえらぶ">
        <button id="replayButton" class="ghost-button replay-button" type="button">もういちど聞く</button>
        <div id="choiceGrid" class="choice-grid" aria-label="だくおん・ようおん候補"></div>
      </section>

      <section id="speechControls" class="controls hidden" aria-label="こえでこたえる">
        <button id="answerButton" class="answer-button" type="button">こたえる</button>
        <button id="nextButton" class="ghost-button" type="button">つぎ</button>
      </section>

      <aside id="heardBox" class="heard-box hidden" aria-live="polite">
        <span>きこえたことば</span>
        <strong id="heardText">まだありません</strong>
      </aside>

      <section id="completePanel" class="complete-panel hidden" aria-live="assertive">
        <div class="complete-box">
          <h1>おめでとう！</h1>
          <p>どれであそぶ？</p>
          <div class="choice-row">
            <button id="playBlackHoleButton" class="answer-button small" type="button">ブラックホール</button>
            <button id="playKingfisherButton" class="answer-button small" type="button">カワセミ</button>
            <button id="playButterflyButton" class="answer-button small" type="button">ちょうちょ</button>
            <button id="stayButton" class="ghost-button small" type="button">もういちど</button>
          </div>
        </div>
      </section>
    </main>

    <script src="hiragana-dakuon.js?v=3"></script>
  </body>
</html>
