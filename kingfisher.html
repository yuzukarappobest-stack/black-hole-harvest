<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#dff8ff">
    <title>カワセミ・ダイブ</title>
    <link rel="stylesheet" href="kingfisher.css?v=1">
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="ゲーム情報">
        <div>
          <span>SCORE</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>TIME</span>
          <strong id="time">30.0</strong>
        </div>
        <div>
          <span>BEST</span>
          <strong id="best">0</strong>
        </div>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="カワセミが池に飛び込んで魚を獲るゲーム"></canvas>

        <div id="startPanel" class="panel">
          <h1>カワセミ・ダイブ</h1>
          <p>止まり木から池へ飛び込んで、30秒でたくさん獲ろう。</p>
          <button id="startButton" type="button">START</button>
        </div>

        <div id="finishPanel" class="panel hidden">
          <p class="label">RESULT</p>
          <h2 id="finalScore">0</h2>
          <p id="resultMessage">もういちど池をねらおう。</p>
          <button id="restartButton" type="button">もういちど</button>
        </div>
      </section>

      <section class="legend" aria-label="得点表">
        <div><span class="fish-dot small"></span>小さな魚 <b>1</b></div>
        <div><span class="fish-dot medium"></span>中位の魚 <b>3</b></div>
        <div><span class="fish-dot large"></span>大きな魚 <b>6</b></div>
        <div><span class="fish-dot shrimp"></span>エビ <b>10</b></div>
        <div><span class="fish-dot lord"></span>池の主 <b>30</b></div>
      </section>
    </main>

    <script src="kingfisher.js?v=1"></script>
  </body>
</html>
