<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6ecb75">
    <title>ダンゴムシめいろ</title>
    <link rel="stylesheet" href="pillbug.css?v=1">
  </head>
  <body>
    <main class="maze-app">
      <section class="hud" aria-label="ゲーム情報">
        <div><span>タイム</span><strong id="time">0.00</strong></div>
        <div><span>ベスト</span><strong id="best">--.--</strong></div>
        <div><span>めいろ</span><strong id="mazeNo">1</strong></div>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="ダンゴムシを操作して迷路を脱出するゲーム"></canvas>
        <div id="startPanel" class="panel">
          <h1>ダンゴムシ<br>めいろ</h1>
          <p>十字キーでゴールのはっぱまで進もう。</p>
          <button id="startButton" type="button">START</button>
        </div>
        <div id="finishPanel" class="panel hidden">
          <p class="label">GOAL!</p>
          <h2 id="resultTime">0.00</h2>
          <p id="resultMessage">はやくぬけられたね。</p>
          <button id="restartButton" type="button">がくしゅうへ</button>
        </div>
      </section>

      <section class="controls" aria-label="操作">
        <span></span>
        <button id="upButton" type="button">↑</button>
        <span></span>
        <button id="leftButton" type="button">←</button>
        <button id="downButton" type="button">↓</button>
        <button id="rightButton" type="button">→</button>
      </section>
    </main>

    <script src="pillbug.js?v=1"></script>
  </body>
</html>
