<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#73d6ff">
    <title>ミニレース</title>
    <link rel="stylesheet" href="race.css?v=1">
  </head>
  <body>
    <main class="race-app">
      <section class="race-hud" aria-label="レース情報">
        <div>
          <span>タイム</span>
          <strong id="raceTime">0.00</strong>
        </div>
        <div>
          <span>スピード</span>
          <strong id="raceSpeed">0</strong>
        </div>
        <div>
          <span>ベスト</span>
          <strong id="raceBest">--.--</strong>
        </div>
      </section>

      <section class="race-stage">
        <canvas id="raceCanvas" aria-label="疑似3Dの草原レースコース"></canvas>

        <div id="readyPanel" class="race-panel">
          <h1>ミニレース</h1>
          <p>アクセルを押して走ろう</p>
          <p>タブレットを左右に傾けて曲がろう</p>
          <p>60秒以内にゴールしよう</p>
          <div class="panel-actions">
            <button id="orientationButton" class="secondary-button" type="button">傾き操作を許可する</button>
            <button id="startButton" type="button">START</button>
          </div>
        </div>

        <div id="finishPanel" class="race-panel hidden">
          <p id="resultLabel" class="label">ゴール！</p>
          <h2 id="resultTitle">0.00</h2>
          <p id="resultMessage">今回のタイム</p>
          <button id="againButton" type="button">もう一度</button>
        </div>
      </section>

      <section class="race-controls" aria-label="操作">
        <button id="leftButton" class="steer-button" type="button" aria-label="左へ曲がる">←</button>
        <button id="pauseButton" class="pause-button" type="button">Ⅱ</button>
        <button id="rightButton" class="steer-button" type="button" aria-label="右へ曲がる">→</button>
        <button id="acceleratorButton" class="accelerator-button" type="button">アクセル</button>
      </section>
    </main>

    <script src="race.js?v=3"></script>
  </body>
</html>
