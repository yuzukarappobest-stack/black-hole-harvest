<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#07152d">
    <title>いんせきシューティング</title>
    <link rel="stylesheet" href="meteor.css?v=2">
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="ゲーム情報">
        <div>
          <span>のこり</span>
          <strong id="time">30.0</strong>
        </div>
        <div class="goal">
          <span>もくひょう</span>
          <strong>400てんでクリア</strong>
        </div>
        <div>
          <span>スコア</span>
          <strong id="score">0</strong>
        </div>
      </section>

      <section class="game-shell">
        <canvas id="game" aria-label="降り注ぐ隕石を撃ち落とすゲーム"></canvas>

        <div id="startPanel" class="panel">
          <h1>いんせき<br><span>シューティング</span></h1>
          <p>タップしたほうへ発射。30秒で400てんをめざそう。</p>
          <button id="startButton" type="button">START</button>
        </div>

        <div id="finishPanel" class="panel hidden">
          <p id="resultLabel" class="label">RESULT</p>
          <h2 id="resultTitle">0</h2>
          <p id="resultMessage">もういちど守ろう。</p>
          <button id="restartButton" type="button">もういちど</button>
        </div>
      </section>

      <section class="tip">
        <span>ねらってタップ</span>
        <strong>⭐ 後半に超大型隕石がくるよ</strong>
      </section>
    </main>

    <script src="meteor.js?v=5"></script>
  </body>
</html>
